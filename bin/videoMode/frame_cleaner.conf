#!/usr/bin/env bash

# ============================================================
# CONFIGURAZIONE GENERALE
# ============================================================
# Questo file contiene solo parametri.
# L'idea è: se vuoi cambiare il comportamento dello script,
# modifichi qui senza toccare la logica nei file .sh.
# ============================================================

# Directory di default se non passi un argomento allo script.
# Esempio:
#   ./4_remove_similar_frames.sh ./frames
# Se non passi nulla, usa questa directory.
DEFAULT_DIR="."

# Pattern dei file da cercare.
# Esempio:
#   frame_00001.jpg
#   frame_00002.jpg
# Se i tuoi file hanno nomi diversi, cambia questo valore.
FRAME_GLOB='frame_*.jpg'

# Nome della cartella dove vengono spostati i file scartati.
# Lo script la crea se non esiste.
SCARTI_SUBDIR='scarti'

# ============================================================
# STEP 1 - FRAME NERI
# ============================================================
# Questo step serve a buttare via i frame quasi completamente neri.
# Esempio pratico:
# - un frame di transizione nero
# - un frame con camera quasi coperta
# - un frame molto scuro che non vuoi tenere
#
# BLACK_THRESHOLD:
#   Sotto questa luminosità il pixel viene considerato "nero".
#   Più alto = filtro più severo.
#
# Esempio:
#   BLACK_THRESHOLD=10
#   -> considera neri i pixel molto scuri.
#   BLACK_THRESHOLD=20
#   -> considera neri anche più pixel, quindi lo script scarta di più.
BLACK_THRESHOLD=10

# BLACK_PCT_MIN:
#   Se almeno questa percentuale di pixel risulta nera,
#   il frame viene considerato troppo nero e spostato in scarti.
#
# Esempio:
#   BLACK_PCT_MIN=80
#   -> se il 80% o più dell'immagine è nero, la scarta.
BLACK_PCT_MIN=80

# ============================================================
# STEP 2 - FRAME BIANCHI
# ============================================================
# Questo step è simile al precedente, ma per i frame troppo chiari.
# Utile per:
# - flash
# - frame sovraesposti
# - schermate completamente bianche
#
# WHITE_THRESHOLD:
#   Sopra questa luminosità il pixel è considerato "bianco".
WHITE_THRESHOLD=90

# WHITE_PCT_MIN:
#   Se la percentuale di pixel bianchi supera questa soglia,
#   il frame viene scartato.
WHITE_PCT_MIN=80

# ============================================================
# STEP 3 - FRAME BRUTTI / SFUOCATI
# ============================================================
# Qui non cerchiamo duplicati, ma frame di qualità bassa.
# Il quality score combina:
# - nitidezza
# - contrasto
# - luminosità media
# - penalità delle zone molto scure
#
# Più il frame è sfocato/scuro/piatto, più il punteggio scende.

# DARK_THRESHOLD:
#   Soglia usata per misurare quante zone sono "molto scure".
DARK_THRESHOLD=10

# DARK_PCT_MAX:
#   Se la percentuale di aree scure supera questo valore,
#   il frame è considerato di scarsa qualità.
DARK_PCT_MAX=80

# BLUR_MIN_SCORE:
#   Se il quality score scende sotto questo valore,
#   il frame viene considerato "brutto" e spostato in scarti.
#
# Esempio:
#   BLUR_MIN_SCORE=8
#   -> abbastanza permissivo.
#   BLUR_MIN_SCORE=12
#   -> più severo.
BLUR_MIN_SCORE=8

# Pesi del quality score.
# Non sono valori assoluti: sono un bilanciamento empirico.
#
# Esempio di effetto:
# - aumentare QS_WEIGHT_SHARPNESS rende lo script più sensibile alla sfocatura
# - aumentare QS_WEIGHT_DARK penalizza di più i frame troppo scuri
QS_WEIGHT_SHARPNESS=0.60
QS_WEIGHT_CONTRAST=0.30
QS_WEIGHT_MEAN=0.10
QS_WEIGHT_DARK=0.70

# ============================================================
# STEP 4 - FRAME SIMILI
# ============================================================
# Questo è lo step più importante per i duplicati/quasi duplicati.

# WINDOW_SIZE:
#   Quanti frame confrontare per blocco.
#
# Esempio:
#   WINDOW_SIZE=5
#   confronta:
#   - 1..5
#   - 6..10
#   - 11..15
#
# Se lo aumenti:
#   - hai confronti più costosi
#   - ma rischi meno di perdere duplicati vicini
#
# Se lo diminuisci:
#   - più veloce
#   - ma puoi perdere alcuni frame simili se stanno appena fuori gruppo
WINDOW_SIZE=5

# HASH_WIDTH / HASH_HEIGHT:
#   Dimensione usata per calcolare il dHash.
#   Con 9x8 ottieni una hash da 64 bit.
#
# Come funziona il dHash:
#   1) riduci l'immagine a 9x8
#   2) la metti in scala di grigi
#   3) confronti ogni pixel con quello a destra
#   4) se il pixel corrente è più chiaro -> 1, altrimenti 0
#
# Esempio:
#   se una riga produce:
#   [120, 130, 125, 140]
#   confronti:
#   120<130 -> 0
#   130>125 -> 1
#   125<140 -> 0
#   ... e così via
#
# Quindi:
# - hash più grande = più sensibile
# - hash più piccola = più veloce ma meno precisa
HASH_WIDTH=6
HASH_HEIGHT=5

# SIMILARITY_MAX_DISTANCE:
#   È la distanza massima di Hamming permessa.
#
# Cos'è la distanza di Hamming:
#   è il numero di bit diversi tra due hash.
#
# Esempio:
#   hash1 = 101100
#   hash2 = 100110
#   differenze = 2
#   quindi distanza di Hamming = 2
#
# Nel tuo caso:
#   - distanza piccola = frame molto simili
#   - distanza grande  = frame diversi
#
# Regola pratica:
#   0..4  -> quasi identici
#   5..8  -> simili
#   9+    -> abbastanza diversi
#
# Se vuoi scartare di più, alza questo valore.
# Se vuoi essere più rigoroso, abbassalo.
SIMILARITY_MAX_DISTANCE=9

# SIMILARITY_THRESHOLD:
#   È una forma normalizzata della distanza:
#   similarity = 1 - (distance / total_bits)
#
# Con una hash da 64 bit:
#   distance = 0  -> similarity = 1.000000
#   distance = 8  -> similarity = 0.875000
#   distance = 16 -> similarity = 0.750000
#
# In pratica:
#   - più la similarità è alta, più i frame sono vicini
#   - questa soglia è utile come secondo criterio
SIMILARITY_THRESHOLD=0.80

# USE_QUALITY_SCORE_FOR_TIEBREAK:
#   Se 1, quando due frame sono simili lo script tiene quello migliore.
#   Se 0, elimina semplicemente uno dei due.
#
# Esempio:
#   frame A = più nitido
#   frame B = più mosso
#   -> tieni A
USE_QUALITY_SCORE_FOR_TIEBREAK=1

# ============================================================
# LOG E DEBUG
# ============================================================

# VERBOSE=1:
#   stampa ogni confronto e i valori intermedi
#
# VERBOSE=0:
#   output più pulito
VERBOSE=1

# Lunghezza della barra di avanzamento.
PROGRESS_BAR_WIDTH=28


# ============================================================
# STEP 5 - DESCRIZIONI AI (modello visione)
# ============================================================
# Endpoint Ollama
OLLAMA_URL="http://localhost:11434"

# Modello multimodale per descrivere i singoli frame.
# Deve supportare immagini (es. llava, moondream, bakllava).
# llava:13b è accurato; llava:7b è più veloce.
OLLAMA_VISION_MODEL="gemma4:e4b"

# Lingua delle descrizioni
LANGUAGE="italiano"

# ============================================================
# STEP 6 - NARRAZIONE AI (modello testuale)
# ============================================================
# Modello testuale per sintetizzare le descrizioni in un racconto.
# Non serve che supporti immagini: è solo testo.
# gemma3:12b è ottimo; puoi usare llama3:8b per velocità.
OLLAMA_TEXT_MODEL="qwen2.5:14b-instruct"