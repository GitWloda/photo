#!/usr/bin/env bash

# ============================================================
# CONFIGURAZIONE FRAME CLEANER
# Modifica qui i parametri senza toccare la logica negli .sh
# ============================================================

# Directory dei frame da processare.
# Può essere sovrascritta passando un argomento allo script:
#   ./startall.sh /percorso/alternativo
DEFAULT_DIR="/data/frame"

# Pattern dei file da cercare.
FRAME_GLOB='frame_*.jpg'

# Nome della sottocartella dove vengono spostati i frame scartati.
SCARTI_SUBDIR='scarti'

# ============================================================
# STEP 1 - FRAME NERI
# ============================================================
BLACK_THRESHOLD=10
BLACK_PCT_MIN=80

# ============================================================
# STEP 2 - FRAME BIANCHI
# ============================================================
WHITE_THRESHOLD=90
WHITE_PCT_MIN=80

# ============================================================
# STEP 3 - FRAME BRUTTI / SFUOCATI
# ============================================================
DARK_THRESHOLD=10
DARK_PCT_MAX=80
BLUR_MIN_SCORE=8

QS_WEIGHT_SHARPNESS=0.60
QS_WEIGHT_CONTRAST=0.30
QS_WEIGHT_MEAN=0.10
QS_WEIGHT_DARK=0.70

# ============================================================
# STEP 4 - FRAME SIMILI (dHash)
# ============================================================
WINDOW_SIZE=5

HASH_WIDTH=6
HASH_HEIGHT=5

SIMILARITY_MAX_DISTANCE=9
SIMILARITY_THRESHOLD=0.80
USE_QUALITY_SCORE_FOR_TIEBREAK=1

# ============================================================
# LOG E DISPLAY
# ============================================================
VERBOSE=1
PROGRESS_BAR_WIDTH=28