<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Gallery AI</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-row topbar-main">
      <h1 class="logo">📷 Photo Gallery AI</h1>

      <!-- VIEW MODE TOGGLE -->
      <div class="view-toggle" role="group" aria-label="Modalità visualizzazione">
        <button id="btn-view-all" class="btn btn-ghost btn-sm active" aria-pressed="true">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Tutto
        </button>
        <button id="btn-view-albums" class="btn btn-ghost btn-sm" aria-pressed="false">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          Album
        </button>
      </div>

      <div class="search-wrap">
        <form id="search-form">
          <input id="search-input" type="text" placeholder="Cerca nome, percorso, descrizione…" autocomplete="off" />
          <button type="submit" class="btn btn-primary">Cerca</button>
          <button type="button" id="clear-btn" class="btn btn-ghost">Reset</button>
        </form>
      </div>
      <button id="toggle-filters-btn" class="btn btn-ghost btn-icon" aria-expanded="false" aria-controls="filter-panel">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M7 12h10M11 18h2"/></svg>
        <span>Filtri</span>
        <span id="filter-badge" class="filter-badge hidden">0</span>
      </button>
    </div>

    <!-- ALBUM BREADCRUMB (shown when inside an album) -->
    <div id="album-breadcrumb" class="album-breadcrumb hidden">
      <button id="btn-album-back" class="btn btn-ghost btn-sm">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Album
      </button>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <span id="album-breadcrumb-label"></span>
    </div>

    <div id="filter-panel" class="filter-panel collapsed">
      <div class="filter-grid">

        <div class="field-group">
          <label for="filter-media-kind">Tipo media</label>
          <select id="filter-media-kind">
            <option value="">Tutti</option>
          </select>
        </div>

        <div class="field-group">
          <label for="filter-ext">Estensione</label>
          <select id="filter-ext">
            <option value="">Tutte</option>
          </select>
        </div>

        <div class="field-group">
          <label for="filter-make">Make (Marca)</label>
          <select id="filter-make">
            <option value="">Tutte</option>
          </select>
        </div>

        <div class="field-group">
          <label for="filter-model">Model (Camera)</label>
          <select id="filter-model">
            <option value="">Tutti</option>
          </select>
        </div>

        <div class="field-group">
          <label for="filter-camera-id">CameraID</label>
          <select id="filter-camera-id">
            <option value="">Tutti</option>
          </select>
        </div>

        <div class="field-group">
          <label for="filter-lens-model">LensModel</label>
          <select id="filter-lens-model">
            <option value="">Tutti</option>
          </select>
        </div>

        <div class="field-group">
          <label for="filter-ai-model">Modello AI</label>
          <select id="filter-ai-model">
            <option value="">Tutti</option>
          </select>
        </div>

        <div class="field-group">
          <label for="filter-folder">Cartella</label>
          <select id="filter-folder">
            <option value="">Tutte</option>
          </select>
        </div>

        <div class="field-group">
          <label for="sort-select">Ordina per</label>
          <select id="sort-select">
            <option value="created_desc">Data inserimento ↓</option>
            <option value="created_asc">Data inserimento ↑</option>
            <option value="mtime_desc">Data file ↓</option>
            <option value="mtime_asc">Data file ↑</option>
            <option value="size_desc">Peso ↓</option>
            <option value="size_asc">Peso ↑</option>
            <option value="name_asc">Nome A→Z</option>
            <option value="name_desc">Nome Z→A</option>
          </select>
        </div>

      </div>

      <div class="filter-toggles">
        <label class="toggle-label">
          <input type="checkbox" id="toggle-folder" />
          <span>Mostra cartella</span>
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="toggle-compact" />
          <span>Vista compatta</span>
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="toggle-group-folder" />
          <span>Raggruppa per cartella</span>
        </label>
      </div>

      <div id="active-chips" class="active-chips"></div>
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <main class="main-layout">

    <!-- GALLERY PANE -->
    <section class="gallery-pane">
      <div class="results-bar">
        <span id="results-text">Caricamento…</span>
        <span id="page-info">Pagina 1 / 1</span>
      </div>

      <div id="gallery-container" class="gallery-container">
        <div id="gallery" class="gallery-grid"></div>
        <div id="empty-state" class="empty-state hidden">Nessun elemento trovato.</div>
      </div>

      <nav class="pagination" aria-label="Paginazione">
        <button id="btn-first"  class="btn btn-ghost btn-sm" disabled>«</button>
        <button id="btn-prev"   class="btn btn-ghost btn-sm" disabled>‹</button>
        <span id="page-label"   class="page-label">1 / 1</span>
        <button id="btn-next"   class="btn btn-ghost btn-sm" disabled>›</button>
        <button id="btn-last"   class="btn btn-ghost btn-sm" disabled>»</button>
      </nav>
    </section>

    <!-- DETAIL PANE -->
    <aside id="detail-pane" class="detail-pane">
      <div id="detail-content" class="detail-content">
        <div class="detail-placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="m3 9 4-4 4 4 4-4 4 4"/><circle cx="8.5" cy="14.5" r="1.5"/></svg>
          <p>Seleziona un elemento per vedere i dettagli</p>
        </div>
      </div>
      <button id="detail-close" class="detail-close btn btn-ghost btn-icon" aria-label="Chiudi dettagli">✕</button>
    </aside>

  </main>

  <script src="/app.js"></script>
</body>
</html>
