<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Gallery AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

  <header class="topbar">
    <div class="topbar-main">
      <a href="#" class="topbar-logo" aria-label="Photo Gallery AI">
        <div class="topbar-logo-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <rect x="3" y="3" width="18" height="18" rx="3.5"/>
            <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" stroke="none"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
        <div>
          <div class="topbar-logo-text">Photo Gallery</div>
          <div class="topbar-logo-sub">AI</div>
        </div>
      </a>

      <div class="topbar-sep"></div>

      <div class="view-tabs" role="group" aria-label="Modalità visualizzazione">
        <button id="btn-view-all" class="view-tab active" aria-pressed="true">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          <span>Tutto</span>
        </button>
        <button id="btn-view-albums" class="view-tab" aria-pressed="false">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          <span>Album</span>
        </button>
      </div>

      <div class="topbar-sep"></div>

      <div class="search-wrap topbar-search-wrap">
        <form id="search-form" class="topbar-search-form" role="search">
          <span class="search-icon" aria-hidden="true">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </span>
          <input id="search-input" class="topbar-search-input" type="search" placeholder="Cerca nome, percorso, descrizione…" autocomplete="off" aria-label="Cerca foto e video" />
          <button type="button" id="clear-btn" class="search-clear" aria-label="Cancella ricerca">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </form>
      </div>

      <div class="topbar-actions">
        <button id="toggle-filters-btn" class="tbtn tbtn-filter" aria-expanded="false" aria-controls="filter-panel">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="4" y1="6" x2="20" y2="6"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
            <line x1="11" y1="18" x2="13" y2="18"/>
          </svg>
          <span>Filtri</span>
          <span id="filter-badge" class="filter-badge hidden">0</span>
        </button>
      </div>
    </div>

    <div id="album-breadcrumb" class="topbar-breadcrumb hidden">
      <button id="btn-album-back" class="bc-back">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Album
      </button>
      <span class="bc-sep" aria-hidden="true">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </span>
      <span id="album-breadcrumb-label" class="bc-label"></span>
    </div>

    <div id="filter-panel" class="filter-panel">
      <div class="filter-panel-inner">
        <div class="filter-panel-body">
          <div class="f-row-1">
            <div class="f-field">
              <label class="f-label" for="filter-media-kind">Tipo media</label>
              <select id="filter-media-kind" class="f-select"><option value="">Tutti</option></select>
            </div>
            <div class="f-field">
              <label class="f-label" for="filter-ext">Estensione</label>
              <select id="filter-ext" class="f-select"><option value="">Tutte</option></select>
            </div>
            <div class="f-field">
              <label class="f-label" for="filter-make">Marca fotocam.</label>
              <select id="filter-make" class="f-select"><option value="">Tutte</option></select>
            </div>
            <div class="f-field">
              <label class="f-label" for="filter-model">Modello cam.</label>
              <select id="filter-model" class="f-select"><option value="">Tutti</option></select>
            </div>
            <div class="f-field">
              <label class="f-label" for="filter-camera-id">Camera ID</label>
              <select id="filter-camera-id" class="f-select"><option value="">Tutti</option></select>
            </div>
            <div class="f-field">
              <label class="f-label" for="filter-lens-model">Obiettivo</label>
              <select id="filter-lens-model" class="f-select"><option value="">Tutti</option></select>
            </div>
            <div class="f-field">
              <label class="f-label" for="filter-ai-model">Modello AI</label>
              <select id="filter-ai-model" class="f-select"><option value="">Tutti</option></select>
            </div>
            <div class="f-field f-wide">
              <label class="f-label" for="filter-folder">Cartella</label>
              <select id="filter-folder" class="f-select"><option value="">Tutte</option></select>
            </div>
            <div class="f-field f-sort">
              <label class="f-label" for="sort-select">Ordina per</label>
              <select id="sort-select" class="f-select">
                <option value="created_desc">Data inserimento ↓</option>
                <option value="created_asc">Data inserimento ↑</option>
                <option value="mtime_desc">Data file ↓</option>
                <option value="mtime_asc">Data file ↑</option>
                <option value="size_desc">Peso ↓</option>
                <option value="size_asc">Peso ↑</option>
                <option value="name_asc">Nome A→Z</option>
                <option value="name_desc">Nome Z→A</option>
              </select>
            </div>
          </div>

          <div class="f-row-2">
            <label class="f-toggle">
              <input type="checkbox" id="toggle-folder" />
              <span>Mostra cartella</span>
            </label>
            <label class="f-toggle">
              <input type="checkbox" id="toggle-compact" />
              <span>Vista compatta</span>
            </label>
            <label class="f-toggle">
              <input type="checkbox" id="toggle-group-folder" />
              <span>Raggruppa per cartella</span>
            </label>
            <button id="reset-filters-btn" class="f-reset" type="button">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="1 4 1 10 7 10"/>
                <path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
              </svg>
              Reset filtri
            </button>
          </div>

          <div id="active-chips" class="active-chips" aria-live="polite"></div>
        </div>
      </div>
    </div>
  </header>

  <main class="main-layout has-left-detail">
    <aside id="detail-pane" class="detail-pane detail-pane-left">
      <div class="detail-pane-toolbar">
        <button id="detail-prev" class="btn btn-ghost btn-icon" aria-label="Contenuto precedente">←</button>
        <button id="detail-next" class="btn btn-ghost btn-icon" aria-label="Contenuto successivo">→</button>
        <button id="detail-close" class="detail-close btn btn-ghost btn-icon" aria-label="Chiudi dettagli">✕</button>
      </div>
      <div id="detail-content" class="detail-content">
        <div class="detail-placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="m3 9 4-4 4 4 4-4 4 4"/>
            <circle cx="8.5" cy="14.5" r="1.5"/>
          </svg>
          <p>Clicca una foto per vedere i dettagli</p>
        </div>
      </div>
    </aside>

    <section class="gallery-pane gallery-pane-main">
      <div class="results-bar">
        <span id="results-text">Caricamento…</span>
        <span id="page-info"></span>
      </div>

      <div id="gallery-container" class="gallery-container">
        <div id="gallery" class="gallery-grid"></div>
        <div id="empty-state" class="empty-state hidden">Nessun elemento trovato.</div>
      </div>

      <nav class="pagination" aria-label="Paginazione">
        <button id="btn-first"  class="btn btn-ghost btn-sm" disabled>«</button>
        <button id="btn-prev"   class="btn btn-ghost btn-sm" disabled>‹</button>
        <span id="page-label"   class="page-label"></span>
        <button id="btn-next"   class="btn btn-ghost btn-sm" disabled>›</button>
        <button id="btn-last"   class="btn btn-ghost btn-sm" disabled>»</button>
      </nav>
    </section>
  </main>

  <div id="detail-backdrop" class="detail-backdrop"></div>

  <script src="/app.js"></script>
</body>
</html>
